name: Build iOS App

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "DMArchiveViewer/**"
      - "project.yml"
      - ".github/workflows/build-ios.yml"

# Needed for the release-publishing step below to create/update a
# release and attach the .ipa to it — the default token permissions
# don't include this.
permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned, device architecture)
        run: |
          xcodebuild \
            -project DMArchiveViewer.xcodeproj \
            -scheme DMArchiveViewer \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build

      - name: Locate built .app
        id: find_app
        run: |
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found — build failed. Check the build step's log above." >&2
            exit 1
          fi
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"

      - name: Package as unsigned .ipa
        run: |
          mkdir -p ipa_build/Payload
          cp -r "${{ steps.find_app.outputs.app_path }}" ipa_build/Payload/
          cd ipa_build
          zip -r -q ../DMArchiveViewer-unsigned.ipa Payload

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: DMArchiveViewer-unsigned-ipa
          path: DMArchiveViewer-unsigned.ipa
          retention-days: 14

      # Artifacts (above) expire and are buried a few clicks deep under
      # the Actions tab. A release is the one obvious, permanent place
      # to grab the current build — reusing the same "latest" tag each
      # run replaces its assets rather than piling up a new release per
      # push, so there's always exactly one clear place to look.
      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automatically built from commit ${{ github.sha }}.

            This is an **unsigned** .ipa — it needs AltStore or SideStore
            (or your own signing setup) to actually install on a device.
            See the repo README for details.
          make_latest: true
          files: DMArchiveViewer-unsigned.ipa
