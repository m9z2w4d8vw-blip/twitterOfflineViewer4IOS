name: DMArchiveViewer
options:
  bundleIdPrefix: com.dmarchive
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

targets:
  DMArchiveViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DMArchiveViewer
    info:
      path: DMArchiveViewer/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dmarchive.viewer
        PRODUCT_NAME: DMArchiveViewer
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        # No Apple Developer account is wired into this workflow — see
        # the README for what that means and the realistic options for
        # getting this onto an actual device. This keeps the build
        # itself signing-independent so it can complete on a bare
        # GitHub Actions runner with nothing but a free Xcode install.
        CODE_SIGN_STYLE: Manual
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
